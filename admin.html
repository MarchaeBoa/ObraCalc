<meta charset="UTF-8"/>

<title>CalcObra Pro — Painel Administrativo</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body,#root{margin:0;padding:0;height:100%;overflow:hidden;background:#040404;}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TN72Q5WD"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div id="root"></div>
<script>
(function() {
  var logged = null;
  try { logged = JSON.parse(localStorage.getItem('co_logged')); } catch(e){}
  if (!logged) { window.location.href = 'calcobra-ultra.html'; return; }

  var users = JSON.parse(localStorage.getItem('co_users') || '[]');
  var user = users.find(function(u){ return u.email === logged.email; });
  if (!user || user.role !== 'admin') {
    alert('Acesso restrito a administradores.');
    window.location.href = 'dashboard.html';
    return;
  }

  fetch('calcobra_admin.jsx')
    .then(function(r) { return r.text(); })
    .then(function(code) {
      var transformed = Babel.transform(code, { presets: ['react'] }).code;
      var script = document.createElement('script');
      script.textContent = transformed + '\n;var root=ReactDOM.createRoot(document.getElementById("root"));root.render(React.createElement(AdminApp));';
      document.body.appendChild(script);
    })
    .catch(function(err) {
      document.getElementById('root').innerHTML = '<div style="color:#e07060;padding:40px;font-family:monospace">Erro ao carregar painel admin: ' + err.message + '</div>';
    });
})();
</script>
</body>
</html>
