<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040404;--gold:#C9982A;--gold2:#DDB040;--gold3:#EEC85A;--gold4:#F8DC82;
  --text:#F2EDE4;--text2:#8A8070;--text3:#3A3530;
}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow-x:hidden;
}

/* ── BACKGROUND ── */
.bg-stars{
  position:fixed;inset:0;z-index:0;
  background:url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920&q=80') center/cover no-repeat;
}
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(0,0,0,.6);
}

/* ── AUTH CARD ── */
.auth-wrap{
  position:relative;z-index:2;
  width:100%;max-width:460px;margin:20px;
  background:#0d0d0d;
  border:1px solid rgba(201,152,42,.22);
  border-radius:20px;
  box-shadow:0 40px 100px rgba(0,0,0,.85),0 0 60px rgba(201,152,42,.1);
  overflow:hidden;
  animation:modalIn .45s cubic-bezier(.16,1,.3,1) both;
}
.auth-gold-line{height:2px;background:linear-gradient(90deg,transparent,#C9982A 20%,#F8DC82 50%,#C9982A 80%,transparent)}
.auth-body{padding:36px 40px 40px}

@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
@keyframes pulseG{0%,100%{box-shadow:0 0 0 0 rgba(201,152,42,.3)}50%{box-shadow:0 0 0 14px rgba(201,152,42,0)}}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-8px);opacity:1}}
@keyframes spinA{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.dg:focus{border-color:rgba(201,152,42,.6)!important;background:rgba(201,152,42,.06)!important}
.dg.ok{border-color:rgba(201,152,42,.4)!important;color:#EEC85A!important}
.dg.bad{border-color:rgba(180,50,40,.5)!important;background:rgba(180,50,40,.08)!important}

/* ── BACK LINK ── */
.back-link{
  position:fixed;top:24px;left:28px;z-index:10;
  display:flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;font-size:13px;
  color:#8A8070;text-decoration:none;
  transition:color .2s;
}
.back-link:hover{color:#F2EDE4}
.back-link svg{transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .auth-body{padding:28px 22px 30px}
  .back-link{top:16px;left:16px}
}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TN72Q5WD"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="bg-stars"></div>
<div class="bg-overlay"></div>

<!-- BACK LINK -->
<a href="/" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  Voltar ao site
</a>

<!-- AUTH CARD -->
<div class="auth-wrap">
  <div class="auth-gold-line"></div>
  <div class="auth-body">

    <!-- LOGO -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none">
        <svg viewBox="0 0 38 38" fill="none" width="30" height="30"><defs><linearGradient id="ml" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#C9982A"/><stop offset="50%" stop-color="#EEC85A"/><stop offset="100%" stop-color="#C9982A"/></linearGradient></defs><polygon points="19,3 33,11 33,27 19,35 5,27 5,11" stroke="url(#ml)" stroke-width="1.2" fill="rgba(201,152,42,0.06)"/><circle cx="19" cy="19" r="3.5" fill="url(#ml)"/></svg>
        <span style="font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:#F2EDE4;letter-spacing:-.5px">Calc<span style="background:linear-gradient(135deg,#C9982A,#EEC85A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Obra</span></span>
      </a>
    </div>

    <!-- VIEW: LOGIN -->
    <div id="v-login">
      <h2 style="font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;letter-spacing:-1px;color:#F2EDE4;margin-bottom:4px">Bem-vindo de volta</h2>
      <p style="font-size:12.5px;color:#8A8070;margin-bottom:24px;font-family:'DM Mono',monospace">Entre na sua conta para continuar</p>
      <div id="err-login" style="display:none;background:rgba(180,50,40,.12);border:1px solid rgba(180,50,40,.3);border-radius:8px;padding:11px 14px;margin-bottom:16px;font-size:12.5px;color:#e07060;font-family:'DM Mono',monospace"></div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:10.5px;color:#8A8070;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;font-family:'DM Mono',monospace">E-mail</label>
        <input id="li-email" type="email" placeholder="seu@email.com" autocomplete="email" style="width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#F2EDE4;font-family:'DM Mono',monospace;font-size:13.5px;outline:none;box-sizing:border-box" onfocus="this.style.borderColor='rgba(201,152,42,.5)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'"/>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:10.5px;color:#8A8070;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;font-family:'DM Mono',monospace">Senha</label>
        <div style="position:relative">
          <input id="li-pass" type="password" placeholder="••••••••" autocomplete="current-password" style="width:100%;padding:12px 44px 12px 15px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#F2EDE4;font-family:'DM Mono',monospace;font-size:13.5px;outline:none;box-sizing:border-box" onfocus="this.style.borderColor='rgba(201,152,42,.5)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'"/>
          <button type="button" onclick="toggleVis('li-pass')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8A8070;padding:4px;display:flex;align-items:center">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="text-align:right;margin-top:7px"><a href="#" onclick="toastMsg('Link de redefinicao enviado!','info');return false" style="font-size:11.5px;color:#C9982A;font-family:'DM Mono',monospace;text-decoration:none">Esqueci a senha</a></div>
      </div>
      <button type="button" onclick="doLogin()" style="width:100%;padding:14px;background:linear-gradient(135deg,#C9982A,#EEC85A,#C9982A);background-size:200%;border:none;border-radius:8px;color:#030303;font-weight:800;font-size:13.5px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 24px rgba(201,152,42,.3)">Entrar na conta</button>
      <div style="display:flex;align-items:center;gap:12px;margin:20px 0"><div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div><span style="font-size:11px;color:#3A3530;font-family:'DM Mono',monospace">ou</span><div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div></div>
      <p style="text-align:center;font-size:12.5px;color:#8A8070;font-family:'DM Mono',monospace">Nao tem conta? <a href="https://link.hubflashglobal.com.br/calcobrapro" style="color:#C9982A;text-decoration:none;font-weight:600">Assinar plano &rarr;</a></p>
    </div>


  </div>
</div>

<script>
(function() {
"use strict";

/* ── ADMIN SEED ── */
(function seedAdmin() {
  var ADM_EMAIL = 'oescolhidoneo9@gmail.com';
  var ADM_PASS  = btoa(unescape(encodeURIComponent('Lojas1515#')));
  var users = JSON.parse(localStorage.getItem('co_users') || '[]');
  if (!users.some(function(u){ return u.email === ADM_EMAIL; })) {
    users.push({ name:'Admin', company:'Yoha Digital', email:ADM_EMAIL, pass:ADM_PASS, ok:true, plan:'pro', role:'admin', at:new Date().toISOString() });
    localStorage.setItem('co_users', JSON.stringify(users));
  }
})();

/* ── URL PARAM: ?modo=register → redirect to checkout ── */
(function checkMode() {
  var params = new URLSearchParams(window.location.search);
  var modo = params.get('modo');
  if (modo === 'register' || modo === 'registro') {
    window.location.href = 'https://link.hubflashglobal.com.br/calcobrapro';
    return;
  }
})();

/* ── HELPERS ── */
window.toggleVis = function(id) {
  var el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
};

function showErr(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr(id) {
  var el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

function setBusy(id, busy) {
  var btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = busy;
  btn.style.opacity = busy ? '0.65' : '1';
  if (busy) {
    btn._orig = btn.textContent;
    btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spinA .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>Aguarde...</span>';
  } else {
    btn.textContent = btn._orig || 'Confirmar';
  }
}


/* ── TOAST ── */
window.toastMsg = function(msg, type) {
  var old = document.getElementById('co-toast');
  if (old) old.remove();
  var pal = { success:{bg:'rgba(15,40,25,.97)',bd:'rgba(58,170,100,.3)',tx:'#3aaa6a'},
               info:{bg:'rgba(12,12,12,.97)',bd:'rgba(201,152,42,.3)',tx:'#EEC85A'},
               warning:{bg:'rgba(30,25,8,.97)',bd:'rgba(230,160,32,.4)',tx:'#f0c040'},
               error:{bg:'rgba(35,10,10,.97)',bd:'rgba(180,50,40,.3)',tx:'#e07060'} };
  var c = pal[type] || pal.info;
  var t = document.createElement('div');
  t.id = 'co-toast';
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);z-index:999999;background:' + c.bg + ';border:1px solid ' + c.bd + ';border-radius:12px;padding:13px 22px;font-family:DM Mono,monospace;font-size:13px;font-weight:500;color:' + c.tx + ';white-space:nowrap;box-shadow:0 16px 48px rgba(0,0,0,.55);opacity:0;transition:all .32s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(16px)';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function() {
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(function() {
    t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(12px)';
    setTimeout(function(){ t.remove(); }, 320);
  }, 3600);
};

/* ── LOGIN ── */
window.doLogin = function() {
  hideErr('err-login');
  var email = document.getElementById('li-email').value.trim();
  var pass  = document.getElementById('li-pass').value;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    return showErr('err-login', 'Informe um e-mail valido.');
  if (!pass || pass.length < 6)
    return showErr('err-login', 'Senha deve ter pelo menos 6 caracteres.');

  var users = JSON.parse(localStorage.getItem('co_users') || '[]');
  var user = null;
  for (var i=0; i<users.length; i++) {
    if (users[i].email === email && users[i].pass === btoa(unescape(encodeURIComponent(pass))) && users[i].ok) {
      user = users[i]; break;
    }
  }
  if (!user) {
    return showErr('err-login', 'E-mail ou senha incorretos.');
  }

  localStorage.setItem('co_logged', JSON.stringify({ name:user.name, email:user.email, company:user.company || '' }));

  document.getElementById('li-email').disabled = true;
  document.getElementById('li-pass').disabled  = true;
  toastMsg('Login realizado! Redirecionando...', 'success');
  setTimeout(function(){ window.location.href = '/dashboard.html'; }, 400);
};


})();
</script>
</body>
</html>
