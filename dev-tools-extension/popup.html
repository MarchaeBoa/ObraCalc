<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>ObraCalc Dev Tools</title>
    <style>
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 240px;
        margin: 0;
        padding: 14px;
        background: #0f172a;
        color: #f8fafc;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        font-weight: 600;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      ul {
        list-style: none;
        padding: 0;
        margin: 10px 0 0;
        font-size: 12px;
        color: #cbd5e1;
      }
      li { padding: 2px 0; }
    </style>
  </head>
  <body>
    <h1>ObraCalc Dev Tools</h1>
    <button id="open-all">Abrir GitHub + Supabase + Vercel</button>
    <ul>
      <li>- github.com</li>
      <li>- supabase.com/dashboard</li>
      <li>- vercel.com/dashboard</li>
    </ul>
    <script src="popup.js"></script>
  </body>
</html>
